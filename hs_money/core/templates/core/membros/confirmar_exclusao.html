{% extends "core/base.html" %}

{% block title %}Excluir Membro — HS Money{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">

    <div class="d-flex align-items-center mb-4">
      <a href="{% url 'core:membro_lista' %}" class="text-muted text-decoration-none me-2">← Membros</a>
      <h5 class="mb-0">Excluir Membro</h5>
    </div>

    <div class="card shadow-sm border-danger">
      <div class="card-body p-4">
        <p>Tem certeza que deseja excluir o membro <strong>{{ membro.nome }}</strong>?</p>
        <p class="text-muted small">Esta ação não pode ser desfeita.</p>

        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Sim, excluir</button>
            <a href="{% url 'core:membro_lista' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
